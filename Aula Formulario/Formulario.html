<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Página de formulário</title>
</head>
<body>

    <h1>Página de formulário</h1>

    <!-- 1. Trocado section por form com o ID correto -->
    <form id="meuForm"> 
        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" name="usuario" placeholder="Digite seu nome">
        <br><br>

        <label for="e-mail">Digite seu e-mail:</label>
        <input type="email" id="e-mail" name="e-mail" placeholder="Digite seu e-mail">
        <br><br>

        <label for="senha">Digite sua senha:</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha">
        <br><br>

        <!-- Botão que aciona a validação do JavaScript -->
        <button type="submit" > Fazer cadastro </button>
    </form>

    <!-- O parágrafo de erro agora começa vazio -->
    <p id="erro"></p>

    <!-- 2. Script movido para o final para garantir que os campos existam ao carregar o JS -->
    <script src="validacao.js"></script>

</body>
</html>
